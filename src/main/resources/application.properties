spring.application.name=my_voting_system
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.web.resources.static-locations=classpath:/static/,file:/D:/my_voting_project_images/

#Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File upload configuration
spring.servlet.multipart.max-file-size=14MB
spring.servlet.multipart.max-request-size=14MB
#database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/votingsystem
spring.datasource.username=root
spring.datasource.password=root

